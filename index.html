<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu Makanan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Menu Makanan</h1>

  <div class="menu">
    <div class="menu-item">
      <h2>Nasi Goreng</h2>
      <p>Rp20.000</p>
      <div class="variant">
        <label for="variant-1">Varian 1</label>
        <input type="radio" id="variant-1" name="variant">
        <p>Nasi goreng biasa</p>
      </div>
      <div class="variant">
        <label for="variant-2">Varian 2</label>
        <input type="radio" id="variant-2" name="variant">
        <p>Nasi goreng ayam</p>
      </div>
      <div class="quantity">
        <label for="quantity">Jumlah</label>
        <input type="number" id="quantity" value="1">
      </div>
    </div>
  </div>

  <div class="total">
    <h2>Total</h2>
    <p id="total-price">Rp0</p>
  </div>

  <button id="submit">Pesan</button>
</body>
<script>
const menuItems = document.querySelectorAll(".menu-item");
    const quantityInput = document.querySelector("#quantity");
    const totalPrice = document.querySelector("#total-price");
    
    menuItems.forEach((menuItem) => {
      const variant = menuItem.querySelector("input[name='variant']:checked").value;
      const price = menuItem.querySelector("p").textContent;
      const quantity = quantityInput.value;
    
      const total = price * quantity;
    
      totalPrice.textContent = total;
    });

    </script>
</html>
